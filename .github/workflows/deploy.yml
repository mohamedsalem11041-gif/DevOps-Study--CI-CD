name: Deploy React to ECS

on:
  push:
    branches:
      - master   # أو main لو انت شغال على main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: react-test
  ECS_CLUSTER: react-cluster
  ECS_SERVICE: react-service
  TASK_DEFINITION: react-task

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout repository
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------
      # 2. Configure AWS credentials
      # -------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # 3. Log in to ECR
      # -------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # 4. Build & test (Node stage)
      # -------------------------
      - name: Build and Test React App
        run: |
          # Build image using Node stage only
          docker build --target builder -t react-test-builder .
          # Run tests
          docker run --rm -e CI=true react-test-builder npm run test

      # -------------------------
      # 5. Build final Nginx image
      # -------------------------
      - name: Build final Docker image
        run: |
          docker build -t $ECR_REPOSITORY:latest .
          docker tag $ECR_REPOSITORY:latest ${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:latest

      # -------------------------
      # 6. Push Docker image to ECR
      # -------------------------
      - name: Push Docker image
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:latest

      # -------------------------
      # 7. Deploy to ECS
      # -------------------------
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true