name: Deploy React to ECS

on: 
  push:
    branches: 
      - master  # أو main لو انت شغال على main

jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY: react-test
      ECS_CLUSTER: react-cluster
      ECS_SERVICE: react-service
      TASK_DEFINITION: react-task
      CONTAINER_NAME: react-container
      AWS_REGION: us-east-1

    steps: 
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY .
          docker tag $ECR_REPOSITORY:latest ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      # 5️⃣ Push Docker image to ECR
      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      # 6️⃣ Download existing ECS Task Definition
      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION \
            --query "taskDefinition" > task-definition.json

      # 7️⃣ Update Task Definition Image & Clean JSON
      - name: Update Task Definition Image & Clean JSON
        run: |
          # استبدال صورة الكونتينر
          jq --arg IMAGE "${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest" \
            '.containerDefinitions[0].image = $IMAGE' task-definition.json > tmp-task-def.json

          # احتفظ فقط بالحقول الأساسية
          jq '{
            family: .family,
            executionRoleArn: .executionRoleArn,
            networkMode: .networkMode,
            containerDefinitions: .containerDefinitions,
            volumes: .volumes,
            requiresCompatibilities: .requiresCompatibilities,
            cpu: .cpu,
            memory: .memory
          }' tmp-task-def.json > new-task-def.json

      # 8️⃣ Register New Task Definition
      - name: Register New Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json

      # 9️⃣ Update ECS Service
      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment